<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master HR Portal | HealthCare+</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #2563eb;
            --primary-soft: #eff6ff;
            --bg: #f8fafc;
            --sidebar: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.04), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
        }

        /* Login Overlay Styling */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        .login-card {
            background: white; padding: 40px; border-radius: 30px; box-shadow: var(--card-shadow);
            width: 100%; max-width: 400px; text-align: center; border: 1px solid #f1f5f9;
        }
        .login-input {
            width: 100%; padding: 14px; margin: 20px 0; border-radius: 12px;
            border: 1px solid #e2e8f0; font-family: inherit; font-size: 1rem; outline: none;
        }
        .login-btn {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            background: var(--primary); color: white; font-weight: 700; cursor: pointer;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--text-main); overflow-x: hidden; }

        /* Sidebar Glassmorphism */
        aside { 
            background: var(--sidebar); 
            border-right: 1px solid #e2e8f0; 
            padding: 40px 24px; 
            position: fixed; 
            width: 280px; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            z-index: 100;
        }
        
        .logo { font-size: 1.6rem; font-weight: 800; margin-bottom: 50px; color: var(--text-main); text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .logo span { color: var(--primary); }
        
        .nav-btn { 
            display: flex; align-items: center; gap: 14px; padding: 14px 18px; border-radius: 16px; 
            color: var(--text-muted); text-decoration: none; font-weight: 600; transition: all 0.3s ease; 
            background: none; border: none; width: 100%; cursor: pointer; text-align: left; font-family: inherit; margin-bottom: 10px;
        }
        .nav-btn:hover { background: #f1f5f9; color: var(--text-main); transform: translateX(5px); }
        .nav-btn.active { background: var(--primary-soft); color: var(--primary); box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.1); }

        /* Main Content */
        main { margin-left: 280px; padding: 60px; max-width: 1400px; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; gap: 30px; }
        h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; }

        .search-container { position: relative; flex-grow: 1; max-width: 600px; }
        .search-container i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-input { 
            width: 100%; padding: 16px 20px 16px 55px; border-radius: 20px; border: 1px solid #e2e8f0; 
            background: white; font-family: inherit; font-size: 1rem; outline: none; transition: 0.3s;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
        }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        /* Stats Cards */
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-bottom: 40px; }
        .stat-card { 
            background: white; padding: 30px; border-radius: 30px; border: 1px solid #f1f5f9; 
            box-shadow: var(--card-shadow); transition: transform 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card small { color: var(--text-muted); font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-card div { font-size: 2.2rem; font-weight: 800; margin-top: 10px; }

        /* Modern Table */
        .content-card { 
            background: white; border-radius: 32px; border: 1px solid #f1f5f9; 
            overflow: hidden; box-shadow: var(--card-shadow); 
        }
        table { width: 100%; border-collapse: collapse; }
        th { 
            background: #fafafa; padding: 24px; text-align: left; font-size: 0.8rem; 
            text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid #f1f5f9; font-weight: 800;
        }
        td { padding: 24px; border-bottom: 1px solid #f8fafc; font-size: 1rem; color: var(--text-main); vertical-align: middle; }
        tr:hover { background: #fbfcfe; }

        .user-info b { color: var(--text-main); display: block; font-size: 1.1rem; margin-bottom: 2px; }
        .user-info span { color: var(--text-muted); font-size: 0.9rem; }

        .badge { padding: 8px 16px; border-radius: 14px; font-size: 0.8rem; font-weight: 800; display: inline-block; }
        .badge-blue { background: #e0e7ff; color: #4338ca; }
        .badge-purple { background: #f3e8ff; color: #7e22ce; }

        .resume-link { 
            color: #ef4444; text-decoration: none; font-weight: 800; 
            display: inline-flex; align-items: center; gap: 10px; background: #fef2f2;
            padding: 10px 18px; border-radius: 14px; font-size: 0.9rem; transition: 0.2s;
        }
        .resume-link:hover { background: #fee2e2; transform: scale(1.03); }

        .action-btn { 
            padding: 10px 20px; border-radius: 12px; border: 1px solid #e2e8f0; 
            background: white; cursor: pointer; font-weight: 700; font-family: inherit; transition: 0.3s;
        }
        .action-btn:hover { background: var(--primary); color: white; transform: translateY(-2px); }

        #loading { padding: 100px; text-align: center; color: var(--primary); font-size: 1.2rem; font-weight: 700; }
        .no-data { padding: 80px; text-align: center; color: var(--text-muted); font-size: 1.1rem; font-weight: 600; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <h2 style="margin-bottom:10px">HR Auth Access</h2>
        <p style="color:var(--text-muted); font-size: 0.9rem">Please enter your administration key.</p>
        <input type="password" id="adminPass" class="login-input" placeholder="Admin Password">
        <button class="login-btn" onclick="checkAuth()">Unlock Dashboard</button>
        <p id="loginError" style="color:red; font-size:0.8rem; margin-top:15px; display:none">Invalid credentials. Access denied.</p>
    </div>
</div>

<div class="layout">
    <aside>
        <a href="firstpage.html" class="logo">Health<span>Care+</span></a>
        <button class="nav-btn active" id="btn-queries" onclick="setView('queries')"><i class="fas fa-layer-group"></i> Inquiries</button>
        <button class="nav-btn" id="btn-applicants" onclick="setView('applicants')"><i class="fas fa-user-check"></i> Applicants</button>
        
        <div style="margin-top: auto;">
            <button class="nav-btn" style="color: #ef4444;" onclick="logout()"><i class="fas fa-power-off"></i> Logout</button>
        </div>
    </aside>

    <main>
        <div class="top-bar">
            <h1 id="viewTitle">General Inquiries</h1>
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" class="search-input" id="searchInput" placeholder="Search by name, email or keyword..." onkeyup="filterTable()">
            </div>
            <button class="action-btn" onclick="loadData()" style="display: flex; align-items: center; gap: 8px;">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
        </div>

        <div class="stats">
            <div class="stat-card">
                <small>Total Database</small>
                <div id="stat-total">0</div>
            </div>
            <div class="stat-card">
                <small>New Submissions</small>
                <div id="stat-today">0</div>
            </div>
            <div class="stat-card">
                <small>Server Status</small>
                <div style="color:#10b981; display:flex; align-items:center; gap:10px;">
                    <span style="height:12px; width:12px; background:#10b981; border-radius:50%; display:inline-block; animation: pulse 2s infinite;"></span>
                    Healthy
                </div>
            </div>
        </div>

        <div class="content-card">
            <div id="loading"><i class="fas fa-circle-notch fa-spin"></i> Syncing with Supabase...</div>
            <div id="noData" class="no-data" style="display:none;">
                <i class="fas fa-folder-open" style="font-size: 3rem; display: block; margin-bottom: 15px; opacity: 0.3;"></i>
                No records found yet.
            </div>
            <div style="overflow-x: auto;">
                <table id="mainTable" style="display: none;">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    // Configuration
    const supabaseUrl = 'https://itvbhpvypgfxdksbpnnt.supabase.co';
    const supabaseKey = 'sb_publishable_Y3gIaNrudZomj23OaA-QEQ_ZJa1oGR5';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
    const ADMIN_KEY = "admin123"; 

    let currentView = 'queries';
    let allData = [];

    // --- Safety Logic (Using sessionStorage for session-only persistence) ---
    function checkAuth() {
        const pass = document.getElementById('adminPass').value;
        if(pass === ADMIN_KEY) {
            // Changed to sessionStorage: clears when tab/browser closes
            sessionStorage.setItem('hr_logged_in', 'true'); 
            document.getElementById('loginOverlay').style.display = 'none';
            loadData();
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    }

    function logout() {
        sessionStorage.removeItem('hr_logged_in');
        window.location.reload();
    }

    // Auto-check on load/refresh
    window.onload = () => {
        // Changed to sessionStorage
        if(sessionStorage.getItem('hr_logged_in') === 'true') {
            document.getElementById('loginOverlay').style.display = 'none';
            loadData();
        }
    }

    // --- Dashboard Logic ---
    function setView(view) {
        currentView = view;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${view}`).classList.add('active');
        document.getElementById('viewTitle').innerText = view === 'queries' ? "General Inquiries" : "Job Applicants";
        loadData();
    }

    async function loadData() {
        // Check sessionStorage
        if(sessionStorage.getItem('hr_logged_in') !== 'true') return;

        const loader = document.getElementById('loading');
        const table = document.getElementById('mainTable');
        const noData = document.getElementById('noData');
        
        loader.style.display = 'block';
        table.style.display = 'none';
        noData.style.display = 'none';

        try {
            const tableName = currentView === 'queries' ? 'hr_queries' : 'applicants';
            const { data, error } = await _supabase.from(tableName).select('*').order('created_at', { ascending: false });

            if (error) throw error;
            allData = data || [];

            document.getElementById('stat-total').innerText = allData.length;
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('stat-today').innerText = allData.filter(i => i.created_at.includes(today)).length;

            if (allData.length === 0) {
                noData.style.display = 'block';
            } else {
                table.style.display = 'table';
                renderTable(allData);
            }

        } catch (err) {
            console.error(err);
            loader.innerHTML = `<div style="color:#ef4444; padding:20px;">
                <i class="fas fa-exclamation-triangle"></i> Access Denied.<br>
                <small style="color:var(--text-muted)">Please check your RLS policies in Supabase.</small>
            </div>`;
        } finally {
            loader.style.display = 'none';
        }
    }

    function renderTable(data) {
        const body = document.getElementById('tableBody');
        const head = document.getElementById('tableHead');
        body.innerHTML = '';

        if (currentView === 'queries') {
            head.innerHTML = `<tr><th>Timestamp</th><th>Sender Details</th><th>Category</th><th>Message</th><th>Actions</th></tr>`;
            data.forEach(i => {
                body.innerHTML += `
                    <tr>
                        <td style="color:var(--text-muted)">${new Date(i.created_at).toLocaleDateString()}</td>
                        <td class="user-info"><b>${i.name || 'N/A'}</b><span>${i.email || 'N/A'}</span></td>
                        <td><span class="badge badge-blue">${i.subject || 'General'}</span></td>
                        <td style="max-width:350px; line-height:1.5">${i.message || ''}</td>
                        <td><button class="action-btn" onclick="navigator.clipboard.writeText('${i.email}'); alert('Email Copied!')">Copy Email</button></td>
                    </tr>`;
            });
        } else {
            head.innerHTML = `<tr><th>Applied Date</th><th>Candidate</th><th>Desired Role</th><th>Resume</th><th>Actions</th></tr>`;
            data.forEach(i => {
                body.innerHTML += `
                    <tr>
                        <td style="color:var(--text-muted)">${new Date(i.created_at).toLocaleDateString()}</td>
                        <td class="user-info"><b>${i.full_name || 'N/A'}</b><span>${i.email || 'N/A'}</span></td>
                        <td><span class="badge badge-purple">${i.role || 'Applicant'}</span></td>
                        <td><a href="${i.resume_url}" target="_blank" class="resume-link"><i class="fas fa-file-pdf"></i> View CV</a></td>
                        <td><button class="action-btn" onclick="window.location.href='mailto:${i.email}'">Contact</button></td>
                    </tr>`;
            });
        }
    }

    function filterTable() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allData.filter(i => {
            if (currentView === 'queries') {
                return (i.name + i.email + i.subject + i.message).toLowerCase().includes(term);
            } else {
                return (i.full_name + i.email + i.role).toLowerCase().includes(term);
            }
        });
        renderTable(filtered);
    }
</script>
</body>
</html>
