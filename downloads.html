<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Portal | HealthCare+</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #0062ff;
            --grad: linear-gradient(135deg, #0062ff 0%, #00f2fe 100%);
            --dark: #0f172a;
            --shadow: 0 20px 40px -10px rgba(0, 98, 255, 0.15);
            --glass: rgba(255, 255, 255, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc;
            color: var(--dark);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- ✨ MODERN AUTH SCREEN --- */
        #authWrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            background-image: radial-gradient(at 0% 0%, rgba(0, 98, 255, 0.08) 0px, transparent 50%);
            display: flex; align-items: center; justify-content: center; z-index: 2000;
        }

        .auth-card {
            background: white; padding: 50px; border-radius: 35px; width: 420px;
            box-shadow: var(--shadow); border: 1px solid #f1f5f9; text-align: center;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .input-box {
            width: 100%; padding: 16px; border-radius: 16px; border: 1px solid #e2e8f0;
            margin-bottom: 15px; font-family: inherit; font-weight: 600; outline: none;
            background: #fcfdfe;
        }

        .input-box:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(0, 98, 255, 0.1); }

        .btn-login {
            width: 100%; padding: 16px; border-radius: 16px; border: none;
            background: var(--grad); color: white; font-weight: 800; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 98, 255, 0.2);
            font-size: 1rem;
        }

        .btn-login:hover { transform: translateY(-2px); filter: brightness(1.05); }

        /* --- 📊 DASHBOARD AREA --- */
        #mainDashboard { opacity: 0; pointer-events: none; transform: scale(0.98); visibility: hidden; }

        .navbar {
            padding: 20px 5%; display: flex; justify-content: space-between; align-items: center;
            background: var(--glass); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid #f1f5f9;
        }
        .logo { font-size: 1.5rem; font-weight: 800; text-decoration: none; color: var(--dark); }
        .logo span { color: var(--primary); }

        .container { max-width: 1100px; margin: 50px auto; padding: 0 20px; }

        .search-section {
            background: white; padding: 35px; border-radius: 30px; box-shadow: var(--shadow);
            margin-bottom: 40px; border: 1px solid #f1f5f9;
        }

        .report-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px;
        }

        .report-card {
            background: white; border-radius: 28px; padding: 30px;
            border: 1px solid #f1f5f9; position: relative;
            animation: fadeIn 0.6s ease forwards;
        }

        .report-card:hover { transform: translateY(-10px); box-shadow: var(--shadow); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .status-pill {
            background: #dcfce7; color: #166534; padding: 6px 14px;
            border-radius: 100px; font-size: 0.65rem; font-weight: 800;
        }

        .icon-circle {
            width: 48px; height: 48px; background: rgba(0, 98, 255, 0.08);
            color: var(--primary); border-radius: 14px; display: flex; align-items: center;
            justify-content: center; margin-bottom: 20px; font-size: 1.2rem;
        }

        .btn-view {
            width: 100%; margin-top: 20px; padding: 12px; border-radius: 12px;
            border: 2px solid #f1f5f9; background: transparent; font-weight: 700;
            cursor: pointer; color: var(--dark);
        }

        .btn-view:hover { background: var(--primary); color: white; border-color: var(--primary); }

        /* --- 📄 REPORT MODAL --- */
        #reportModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center; z-index: 3000;
        }

        .modal-content {
            background: white; width: 95%; max-width: 800px; border-radius: 35px;
            max-height: 90vh; overflow-y: auto; padding: 40px; position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }

        .print-area { padding: 25px; border: 1px solid #f1f5f9; border-radius: 25px; }

        @media print {
            body * { visibility: hidden; }
            #reportModal, #reportModal *, .print-area, .print-area * { visibility: visible; }
            #reportModal { position: absolute; left: 0; top: 0; width: 100%; background: white; display: flex !important; }
            .modal-content { box-shadow: none; width: 100%; padding: 0; border: none; max-height: none; overflow: visible; }
            .no-print { display: none !important; }
            .rad-image-container { border: 1px solid #000 !important; }
        }
    </style>
</head>
<body>

<div id="authWrapper">
    <div class="auth-card">
        <i class="fas fa-shield-alt" style="font-size: 3.5rem; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; display: block;"></i>
        <h2 style="font-weight: 800; margin-bottom: 10px; letter-spacing: -0.5px;">Portal Login</h2>
        <p style="color: #64748b; margin-bottom: 30px; font-size: 0.95rem;">Access your secure HealthCare+ records</p>
        
        <input type="email" id="loginEmail" class="input-box" placeholder="Email Address">
        <input type="password" id="loginPass" class="input-box" placeholder="Security Password">
        
        <button class="btn-login" id="loginBtn" onclick="handleAuth()">Sign In to Dashboard</button>
        <p id="authStatus" style="margin-top: 15px; font-size: 0.75rem; color: #ef4444; font-weight: 600; min-height: 1em;"></p>
    </div>
</div>

<div id="mainDashboard">
    <nav class="navbar">
        <a href="#" class="logo">HealthCare<span>+</span></a>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div style="text-align: right;">
                <p id="userBadge" style="font-size: 0.75rem; font-weight: 800; color: var(--dark);"></p>
                <p style="font-size: 0.6rem; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 1px;">Verified Account</p>
            </div>
            <button onclick="location.reload()" style="background:#fff1f2; border:none; padding: 10px 18px; border-radius: 12px; font-weight:700; color:#e11d48; cursor:pointer;">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="search-section">
            <h3 style="margin-bottom: 20px; font-weight: 800; display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-clipboard-check" style="color: var(--primary);"></i>
                Laboratory History
            </h3>
            <div style="display: flex; gap: 12px;">
                <input type="email" id="email" class="input-box" style="margin-bottom: 0;" placeholder="Syncing email..." readonly>
                <button onclick="getReports()" class="btn-login" style="width: 180px;">
                    <i class="fas fa-sync-alt"></i> Refresh Data
                </button>
            </div>
        </div>

        <div class="report-grid" id="data">
            </div>
    </div>
</div>

<div id="reportModal">
    <div class="modal-content">
        <button class="no-print" onclick="closeModal()" style="position: absolute; top: 25px; right: 25px; border: none; background: #f1f5f9; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;">
            <i class="fas fa-times" style="font-size: 1.2rem; color: #64748b;"></i>
        </button>
        
        <div class="print-area" id="printContent">
            </div>

        <div style="margin-top: 35px; display: flex; gap: 15px;" class="no-print">
            <button onclick="window.print()" class="btn-login" style="flex: 2;">
                <i class="fas fa-print"></i> Generate PDF / Print
            </button>
            <button onclick="closeModal()" class="btn-view" style="margin-top: 0; flex: 1;">Dismiss</button>
        </div>
    </div>
</div>

<script>
    const supabaseClient = supabase.createClient(
        'https://itvbhpvypgfxdksbpnnt.supabase.co', 
        'sb_publishable_Y3gIaNrudZomj23OaA-QEQ_ZJa1oGR5'
    );

    async function handleAuth() {
        const emailInput = document.getElementById('loginEmail').value.trim();
        const passInput = document.getElementById('loginPass').value;
        const statusMsg = document.getElementById('authStatus');
        const btn = document.getElementById('loginBtn');

        if(!emailInput || !passInput) { statusMsg.innerText = "Please enter all security credentials."; return; }

        btn.disabled = true;
        btn.innerText = "Checking Identity...";
        
        try {
            const { data: user, error } = await supabaseClient
                .from('patient_auth')
                .select('*')
                .eq('email', emailInput)
                .eq('password', passInput)
                .maybeSingle();

            if (user) {
                document.getElementById('authWrapper').style.transform = "translateY(-100%)";
                document.getElementById('authWrapper').style.opacity = "0";
                
                setTimeout(() => {
                    document.getElementById('authWrapper').style.display = "none";
                    const dash = document.getElementById('mainDashboard');
                    dash.style.visibility = "visible";
                    dash.style.opacity = "1";
                    dash.style.transform = "scale(1)";
                    dash.style.pointerEvents = "all";
                    
                    document.getElementById('email').value = emailInput;
                    document.getElementById('userBadge').innerText = emailInput;
                    getReports();
                }, 600);
            } else {
                statusMsg.innerText = "Access Denied: Invalid Email or Password.";
                btn.disabled = false;
                btn.innerText = "Sign In to Dashboard";
            }
        } catch (e) { 
            statusMsg.innerText = "Connection Error."; 
            btn.disabled = false;
        }
    }

    async function getReports() {
        const email = document.getElementById('email').value.trim();
        const dataDiv = document.getElementById('data');
        dataDiv.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding: 40px;"><i class="fas fa-circle-notch fa-spin"></i> Fetching records...</div>';

        const { data, error } = await supabaseClient
            .from('lab_reports')
            .select('*')
            .ilike('patient_email', email);

        if (data && data.length > 0) {
            let html = "";
            data.forEach((r, index) => {
                const isRad = r.test_name?.toLowerCase().includes('x-ray') || 
                              r.test_name?.toLowerCase().includes('mri') || 
                              r.test_name?.toLowerCase().includes('scan');
                
                html += `
                    <div class="report-card" style="animation-delay: ${index * 0.1}s">
                        <div style="display: flex; justify-content: space-between; align-items: start;">
                            <div class="icon-circle"><i class="fas ${isRad ? 'fa-x-ray' : 'fa-vial'}"></i></div>
                            <span class="status-pill">VERIFIED</span>
                        </div>
                        <p style="font-size: 0.65rem; font-weight: 800; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase;">ID: ${r.patient_id || 'N/A'}</p>
                        <h3 style="margin-bottom: 15px; font-weight: 800; letter-spacing: -0.3px;">${r.test_name}</h3>
                        <div style="background: #f8fafc; padding: 20px; border-radius: 20px; border: 1px solid #f1f5f9;">
                             <p style="font-size: 0.65rem; color: #64748b; font-weight: 700; margin-bottom: 5px;">RESULT VALUE</p>
                             <p style="font-size: 1.25rem; font-weight: 800; color: var(--primary);">${r.result || 'Pending'}</p>
                        </div>
                        <button class="btn-view" onclick='viewReport(${JSON.stringify(r).replace(/'/g, "&apos;")})'>
                            <i class="fas fa-file-alt"></i> View Report
                        </button>
                    </div>`;
            });
            dataDiv.innerHTML = html;
        } else {
            dataDiv.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding: 100px; color:#94a3b8;">No records found.</div>';
        }
    }

    function viewReport(record) {
        const modal = document.getElementById('reportModal');
        const content = document.getElementById('printContent');
        const isRad = record.test_name?.toLowerCase().includes('x-ray') || 
                      record.test_name?.toLowerCase().includes('mri') || 
                      record.test_name?.toLowerCase().includes('scan');
        
        // Ensure this matches your Supabase column name
        const imageUrl = record.report_image || null;

        content.innerHTML = `
            <div style="text-align:center; border-bottom: 2px solid #f1f5f9; padding-bottom: 25px; margin-bottom: 25px;">
                <h1 style="color:var(--primary); font-weight:900; font-size: 2rem;">HealthCare<span style="color:#000;">+</span></h1>
                <p style="font-size:0.75rem; font-weight:800; color:#94a3b8; letter-spacing:3px; margin-top: 5px;">OFFICIAL MEDICAL REPORT</p>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; font-size: 0.9rem;">
                <div>
                    <p style="margin-bottom: 5px;"><b>PATIENT NAME:</b> ${record.patient_name || 'N/A'}</p>
                    <p><b>PATIENT ID:</b> ${record.patient_id || 'N/A'}</p>
                </div>
                <div style="text-align:right;">
                    <p style="margin-bottom: 5px;"><b>REPORT DATE:</b> ${new Date().toLocaleDateString()}</p>
                    <p><b>DEPARTMENT:</b> ${isRad ? 'RADIOLOGY & IMAGING' : 'CLINICAL PATHOLOGY'}</p>
                </div>
            </div>
            <div style="background: #ffffff; padding: 35px; border-radius: 25px; border: 2px solid #f1f5f9;">
                <h4 style="margin-bottom: 12px; color: #64748b; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px;">Diagnostic Summary</h4>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h2 style="font-weight: 800;">${record.test_name}</h2>
                    <span style="background: var(--primary); color: white; padding: 8px 16px; border-radius: 12px; font-weight: 800;">${record.result}</span>
                </div>
                
                ${imageUrl ? `
                    <div class="rad-image-container" style="margin-top: 25px; border: 2px solid #f1f5f9; border-radius: 20px; overflow: hidden; background: #000;">
                        <div style="background: #f1f5f9; padding: 8px; font-size: 0.65rem; font-weight: 800; color: #64748b; text-align: center;">ATTACHED SCAN VIEW</div>
                        <img src="${imageUrl}" style="width: 100%; display: block; max-height: 500px; object-fit: contain;" alt="Medical Scan">
                    </div>
                ` : ''}

                <p style="margin-top: 25px; font-size: 0.9rem; color: #475569; line-height:1.7; border-top: 1px solid #f1f5f9; padding-top: 20px;">
                    <b>Clinical Interpretation:</b> ${isRad ? 'Findings consistent with images provided.' : 'Laboratory values fall within verified clinical parameters.'} This document was generated electronically through the HealthCare+ Unified Portal.
                </p>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: flex-end; padding-top: 30px;">
                <div style="background: #f8fafc; padding: 15px; border-radius: 15px; border: 1px dashed #cbd5e1;">
                    <i class="fas fa-qrcode" style="font-size: 3rem; color: #94a3b8;"></i>
                </div>
                <div style="text-align: right;">
                    <p style="font-weight: 800; font-size: 1.1rem; margin-bottom: 2px;">Dr. Sameer Khanna</p>
                    <p style="font-size: 0.8rem; color: #64748b; font-weight: 600;">Chief Medical Consultant</p>
                </div>
            </div>
        `;

        modal.style.display = 'flex';
    }

    function closeModal() { document.getElementById('reportModal').style.display = 'none'; }
</script>

</body>
</html>
