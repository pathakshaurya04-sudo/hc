<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration | HealthCare+</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary: #2563eb; 
            --primary-glow: rgba(37, 99, 235, 0.2);
            --bg: #f1f5f9; 
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #e2e8f0, #f8fafc);
            color: var(--text-main); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
        }

        .card { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 32px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); 
            width: 100%; 
            max-width: 500px; 
            border: 1px solid rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
        }

        h2 {
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: -0.025em;
            margin-bottom: 8px;
            text-align: center;
            color: var(--text-main);
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .form-group { margin-bottom: 24px; }

        label { 
            display: block; 
            font-weight: 700; 
            font-size: 0.75rem; 
            margin-bottom: 8px; 
            text-transform: uppercase; 
            letter-spacing: 0.05em;
            color: var(--text-muted); 
        }

        input, select, textarea { 
            width: 100%; 
            padding: 14px 16px; 
            border-radius: 14px; 
            border: 2px solid #f1f5f9; 
            font-family: inherit; 
            font-size: 1rem; 
            font-weight: 500;
            color: var(--text-main);
            background: #f8fafc;
            transition: all 0.2s ease;
            box-sizing: border-box; 
        }

        input:focus, select:focus, textarea:focus { 
            outline: none; 
            border-color: var(--primary); 
            background: white;
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .btn { 
            width: 100%; 
            padding: 16px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 16px; 
            font-weight: 700; 
            font-size: 1rem;
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        .btn:hover { 
            background: #1d4ed8;
            transform: translateY(-2px); 
            box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.4);
        }

        .btn:active { transform: translateY(0); }

        .success { 
            display: none; 
            background: #f0fdf4; 
            color: #166534; 
            padding: 16px; 
            border-radius: 16px; 
            text-align: center; 
            margin-bottom: 24px; 
            font-weight: 700; 
            border: 1px solid #bbf7d0;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #tkn { 
            font-family: monospace; 
            background: #dcfce7; 
            padding: 2px 6px; 
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Event Registration</h2>
        <p class="subtitle">Secure your spot at HealthCare+ Lucknow</p>
        
        <div id="msg" class="success">
            ✨ Registration Confirmed!<br>
            <small>Entry Token: <span id="tkn"></span></small>
        </div>
        
        <form id="regForm">
            <div class="form-group">
                <label>Attendee Name</label>
                <input type="text" id="name" required placeholder="Enter full name">
            </div>

            <div class="form-group">
                <label>Venue</label>
                <select id="venue" required>
                    <option value="Apollo Medics Lucknow">Apollo Medics - Lucknow</option>
                    <option value="Medanta Lucknow">Medanta - Lucknow</option>
                    <option value="Max Super Speciality">Max Hospital - Lucknow</option>
                    <option value="Sahara Hospital">Sahara Hospital - Lucknow</option>
                </select>
            </div>

            <div style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 1;">
                    <label>Category</label>
                    <select id="cat" required>
                        <option value="Seminar">Seminar</option>
                        <option value="Webinar">Webinar</option>
                        <option value="Conference">Conference</option>
                        <option value="Workshop">Workshop</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Date</label>
                    <input type="date" id="date" required>
                </div>
            </div>

            <div class="form-group">
                <label>Additional Notes</label>
                <textarea id="notes" rows="2" placeholder="Dietary needs or special requests..."></textarea>
            </div>

            <button type="submit" id="btn" class="btn">Confirm Registration</button>
        </form>
    </div>

    <script>
        const _supabase = supabase.createClient('https://itvbhpvypgfxdksbpnnt.supabase.co', 'sb_publishable_Y3gIaNrudZomj23OaA-QEQ_ZJa1oGR5');

        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            btn.disabled = true;
            btn.innerText = 'Syncing to Cloud...';

            const token = 'EVT-' + Math.floor(1000 + Math.random() * 9000);
            
            const { error } = await _supabase.from('event_logs').insert([{
                attendee_name: document.getElementById('name').value,
                venue: document.getElementById('venue').value,
                category: document.getElementById('cat').value,
                event_date: document.getElementById('date').value,
                notes: document.getElementById('notes').value,
                event_token: token
            }]);

            if (!error) {
                document.getElementById('tkn').innerText = token;
                document.getElementById('msg').style.display = 'block';
                document.getElementById('regForm').reset();
                document.getElementById('date').valueAsDate = new Date(); // Reset date too
            } else {
                alert('Error: ' + error.message);
            }
            btn.disabled = false;
            btn.innerText = 'Confirm Registration';
        });

        document.getElementById('date').valueAsDate = new Date();
    </script>
</body>
</html>
